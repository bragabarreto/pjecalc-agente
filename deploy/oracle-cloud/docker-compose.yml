# docker-compose.yml — pjecalc-agente (Oracle Cloud)
#
# Uso:
#   cp .env.example .env   # edite com suas chaves
#   docker compose up -d
#   docker compose logs -f pjecalc
#
# Volumes persistentes em /opt/pjecalc-data/

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pjecalc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pjecalc_secret}
      POSTGRES_DB: pjecalc
    volumes:
      - /opt/pjecalc-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pjecalc"]
      interval: 10s
      timeout: 5s
      retries: 5

  pjecalc:
    build: .
    restart: unless-stopped
    mem_limit: 4608m
    memswap_limit: 6144m
    shm_size: 256m
    ports:
      - "8000:8000"
    environment:
      # Chaves de API (obrigatórias)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Banco de dados
      DATABASE_URL: postgresql://pjecalc:${POSTGRES_PASSWORD:-pjecalc_secret}@postgres:5432/pjecalc
      # Modo
      CLOUD_MODE: "false"
      # Feature flags
      EXPRESSO_CRASH_PROTECTION: "true"
      H2_CLEANUP_ENABLED: "true"
      CALCULATION_PERSISTENCE: "true"
      # Modo teste: número CNJ do cálculo existente no PJE-Calc H2 a usar em vez de criar novo.
      # Ex: PJECALC_CALCULO_TESTE=0000948-78.2021.5.07.0003
      # Deixar vazio para modo normal (cria cálculo novo a cada automação).
      PJECALC_CALCULO_TESTE: ${PJECALC_CALCULO_TESTE:-}
    volumes:
      - /opt/pjecalc-data/calculations:/app/data/calculations
      - /opt/pjecalc-data/pjecalc-dados:/opt/pjecalc/.dados
    depends_on:
      postgres:
        condition: service_healthy
