# railway.toml — Configuração de deploy Railway
# Documentação: https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# docker-entrypoint.sh inicia PJE-Calc (Tomcat) + aguarda + sobe uvicorn
startCommand = "/usr/local/bin/docker-entrypoint.sh"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
